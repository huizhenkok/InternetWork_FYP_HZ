<div class="fixed inset-0 z-[100] flex items-center justify-center px-4">
  <div class="absolute inset-0 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm" (click)="closeModal()"></div>

  <div class="relative w-full max-w-lg glass-panel bg-white/95 dark:bg-[#121212]/95 rounded-3xl p-8 shadow-2xl border border-slate-200 dark:border-white/10">
    <button (click)="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-red-500 cursor-pointer bg-transparent border-none outline-none transition-colors">
      <span class="material-symbols-outlined text-2xl">close</span>
    </button>

    <div class="mb-6">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest bg-primary/10 text-primary border border-primary/20 mb-3">
        <span class="material-symbols-outlined text-[14px]">edit_calendar</span> Reservation
      </div>
      <h2 class="text-3xl font-black text-slate-900 dark:text-white leading-tight">Book <br/><span class="text-transparent bg-clip-text bg-gradient-to-r from-accent-teal to-primary">{{ room?.name }}</span></h2>
    </div>

    <div class="flex flex-col gap-4">

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-wider ml-1">Select Date</label>
          <input [(ngModel)]="bookingData.date" type="date" class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-1 focus:ring-primary focus:border-primary outline-none font-body shadow-inner"/>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-wider ml-1">Attendees (Pax)</label>
          <input [(ngModel)]="bookingData.pax" type="number" placeholder="e.g. 5" class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-1 focus:ring-primary outline-none font-body shadow-inner"/>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-wider ml-1">Start Time</label>
          <input [(ngModel)]="bookingData.startTime" type="time" class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-1 focus:ring-primary outline-none font-body shadow-inner"/>
        </div>
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-wider ml-1">End Time</label>
          <input [(ngModel)]="bookingData.endTime" type="time" class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-1 focus:ring-primary outline-none font-body shadow-inner"/>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-wider ml-1">Equipment Needed</label>
        <input [(ngModel)]="bookingData.equipment" type="text" class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-1 focus:ring-primary outline-none font-body shadow-inner" placeholder="e.g. Projector, Mac (comma separated)"/>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[10px] font-bold text-slate-500 dark:text-gray-400 uppercase tracking-wider ml-1">Purpose of Booking</label>
        <textarea [(ngModel)]="bookingData.purpose" rows="2" class="w-full bg-slate-50 dark:bg-black/40 border border-slate-200 dark:border-white/10 rounded-xl px-4 py-3 text-slate-900 dark:text-white focus:ring-1 focus:ring-primary outline-none font-body resize-none shadow-inner" placeholder="e.g. Research Meeting, Hardware Testing..."></textarea>
      </div>

      <button (click)="saveBooking()" class="glow-button w-full mt-2 bg-gradient-to-r from-accent-teal to-accent-cyan text-white dark:text-black text-sm font-bold px-6 py-4 rounded-xl transition-all duration-300 transform hover:scale-[1.02] flex items-center justify-center gap-2 cursor-pointer border-none shadow-lg">
        <span class="material-symbols-outlined text-lg">check_circle</span> Confirm Reservation
      </button>
    </div>
  </div>
</div>
