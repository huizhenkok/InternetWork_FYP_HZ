<footer class="w-full relative z-40 bg-white/50 dark:bg-[#050505]/80 backdrop-blur-xl border-t border-slate-200 dark:border-white/10 mt-auto">
  <div class="max-w-[1200px] mx-auto px-6 py-10">
    <div class="flex flex-col items-center justify-center gap-8">

      <div class="bg-white px-6 py-4 rounded-2xl shadow-sm border border-slate-100 hover:shadow-md transition-shadow">
        <img src="/IOTUUMlogo.png" alt="UUM INWLab Logo" class="h-16 md:h-20 w-auto object-contain" />
      </div>

      <div *ngIf="isConferencePage" class="flex flex-col items-center text-center gap-1 text-slate-600 dark:text-gray-300 font-body text-sm bg-slate-100/50 dark:bg-white/5 px-8 py-8 rounded-[2rem] border border-slate-200 dark:border-white/10 animate-fade-in w-full max-w-2xl shadow-inner">
        <h4 class="font-bold text-primary dark:text-white text-xl mb-3 tracking-wide">InterNetWorks Research Laboratory</h4>
        <p>School of Computing, Universiti Utara Malaysia,</p>
        <p>06010, UUM Sintok, Kedah Darul Aman, Malaysia.</p>

        <div class="flex flex-wrap justify-center gap-x-6 gap-y-4 mt-6 text-slate-500 dark:text-gray-400 font-medium">
          <span class="flex items-center gap-2 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px] text-accent-cyan">call</span> +604-928 5089
          </span>
          <span class="flex items-center gap-2 hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-[20px] text-accent-cyan">fax</span> +604-928 5067
          </span>
          <a [href]="'mailto:netapps@internetworks.my'" class="flex items-center gap-2 hover:text-primary transition-colors no-underline text-inherit">
            <span class="material-symbols-outlined text-[20px] text-accent-cyan">mail</span> netapps&#64;internetworks.my
          </a>
        </div>
      </div>

      <div class="text-center text-slate-500 dark:text-gray-500 text-sm font-bold tracking-widest uppercase">
        &copy; 2026. Internetworks Research Laboratory. All Rights Reserved.
      </div>

    </div>
  </div>
</footer>
