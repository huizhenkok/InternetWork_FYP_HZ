<div class="relative min-h-screen bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-white pt-32 pb-20 overflow-hidden">
  <div class="absolute inset-0 z-0 fixed h-full w-full pointer-events-none">
    <div class="absolute top-[-10%] left-[20%] w-[500px] h-[500px] bg-accent-teal rounded-full blur-[120px] opacity-10 dark:opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[10%] w-[600px] h-[600px] bg-accent-cyan rounded-full blur-[140px] opacity-10 dark:opacity-10"></div>
  </div>

  <div class="max-w-[1200px] mx-auto px-6 relative z-10 animate-in fade-in duration-700">
    <div class="text-center mb-16">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-primary/30 bg-primary/10 w-fit mb-6">
        <span class="text-xs font-bold tracking-wide uppercase text-primary dark:text-[#0df2f2]">About UUM & INWLab</span>
      </div>
      <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tight">{{ titleFirstPart }} <span class="text-primary dark:text-[#0df2f2]">{{ titleLastPart }}</span></h1>
    </div>

    <div class="bg-white dark:bg-[#121212]/80 backdrop-blur-lg rounded-3xl p-8 md:p-12 border border-slate-200 dark:border-white/10 shadow-lg mb-12">
      <p class="text-lg text-slate-600 dark:text-gray-300 leading-relaxed mb-6 text-justify">{{ cmsData.paragraph1 }}</p>
      <p class="text-lg text-slate-600 dark:text-gray-300 leading-relaxed mb-6 text-justify">{{ cmsData.paragraph2 }}</p>
      <p class="text-lg text-slate-600 dark:text-gray-300 leading-relaxed text-justify">{{ cmsData.paragraph3 }}</p>
    </div>

    <h3 class="text-2xl font-bold text-center mb-8 uppercase tracking-widest text-slate-500 dark:text-gray-400">{{ cmsData.thrustsTitle }}</h3>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in slide-in-from-bottom-8 duration-700 delay-200 fill-mode-both">
      <div class="glass-card rounded-2xl p-8 border border-slate-200 dark:border-white/10 text-center hover:-translate-y-2 transition-transform duration-300 shadow-sm">
        <div class="size-16 mx-auto bg-primary/10 text-primary dark:bg-[#0df2f2]/10 dark:text-[#0df2f2] rounded-full flex items-center justify-center mb-6"><span class="material-symbols-outlined text-3xl">school</span></div>
        <p class="font-bold text-lg leading-snug">{{ cmsData.thrust1 }}</p>
      </div>
      <div class="glass-card rounded-2xl p-8 border border-slate-200 dark:border-white/10 text-center hover:-translate-y-2 transition-transform duration-300 shadow-sm">
        <div class="size-16 mx-auto bg-primary/10 text-primary dark:bg-[#0df2f2]/10 dark:text-[#0df2f2] rounded-full flex items-center justify-center mb-6"><span class="material-symbols-outlined text-3xl">menu_book</span></div>
        <p class="font-bold text-lg leading-snug">{{ cmsData.thrust2 }}</p>
      </div>
      <div class="glass-card rounded-2xl p-8 border border-slate-200 dark:border-white/10 text-center hover:-translate-y-2 transition-transform duration-300 shadow-sm">
        <div class="size-16 mx-auto bg-primary/10 text-primary dark:bg-[#0df2f2]/10 dark:text-[#0df2f2] rounded-full flex items-center justify-center mb-6"><span class="material-symbols-outlined text-3xl">hub</span></div>
        <p class="font-bold text-lg leading-snug">{{ cmsData.thrust3 }}</p>
      </div>
    </div>
  </div>
</div>
