<div class="relative min-h-screen bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-white pt-32 pb-20 overflow-hidden">
  <div class="absolute inset-0 z-0 fixed h-full w-full pointer-events-none">
    <div class="absolute top-[-10%] left-[20%] w-[500px] h-[500px] bg-accent-teal rounded-full blur-[120px] opacity-10 dark:opacity-20 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[10%] w-[600px] h-[600px] bg-accent-cyan rounded-full blur-[140px] opacity-10 dark:opacity-10"></div>
  </div>

  <div class="max-w-[1000px] mx-auto px-6 relative z-10">
    <div class="text-center mb-16" data-aos="fade-down">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-primary/30 bg-primary/10 w-fit mb-6">
        <span class="text-xs font-bold tracking-wide uppercase text-primary dark:text-[#0df2f2]">Core Values</span>
      </div>
      <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tight">{{ titleFirstPart }} <span class="text-primary dark:text-[#0df2f2]">{{ titleLastPart }}</span></h1>
    </div>

    <div class="space-y-6 mb-16 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 dark:before:via-white/20 before:to-transparent">

      <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group" data-aos="fade-up">
        <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-[#050505] bg-primary dark:bg-[#0df2f2] text-white dark:text-black shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2"><span class="material-symbols-outlined text-[20px]">public</span></div>
        <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white dark:bg-[#121212] p-6 rounded-2xl border border-slate-200 dark:border-white/10 shadow-sm"><p class="text-slate-600 dark:text-gray-300 leading-relaxed text-sm md:text-base">{{ cmsData.point1 }}</p></div>
      </div>

      <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group" data-aos="fade-up" data-aos-delay="100">
        <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-[#050505] bg-primary dark:bg-[#0df2f2] text-white dark:text-black shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2"><span class="material-symbols-outlined text-[20px]">nature_people</span></div>
        <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white dark:bg-[#121212] p-6 rounded-2xl border border-slate-200 dark:border-white/10 shadow-sm"><p class="text-slate-600 dark:text-gray-300 leading-relaxed text-sm md:text-base">{{ cmsData.point2 }}</p></div>
      </div>

      <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group" data-aos="fade-up" data-aos-delay="200">
        <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-[#050505] bg-primary dark:bg-[#0df2f2] text-white dark:text-black shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2"><span class="material-symbols-outlined text-[20px]">balance</span></div>
        <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white dark:bg-[#121212] p-6 rounded-2xl border border-slate-200 dark:border-white/10 shadow-sm"><p class="text-slate-600 dark:text-gray-300 leading-relaxed text-sm md:text-base">{{ cmsData.point3 }}</p></div>
      </div>

      <div class="relative flex items-center justify-between md:justify-normal md:odd:flex-row-reverse group" data-aos="fade-up" data-aos-delay="300">
        <div class="flex items-center justify-center w-10 h-10 rounded-full border-4 border-white dark:border-[#050505] bg-primary dark:bg-[#0df2f2] text-white dark:text-black shadow shrink-0 md:order-1 md:group-odd:-translate-x-1/2 md:group-even:translate-x-1/2"><span class="material-symbols-outlined text-[20px]">workspace_premium</span></div>
        <div class="w-[calc(100%-4rem)] md:w-[calc(50%-2.5rem)] bg-white dark:bg-[#121212] p-6 rounded-2xl border border-slate-200 dark:border-white/10 shadow-sm"><p class="text-slate-600 dark:text-gray-300 leading-relaxed text-sm md:text-base">{{ cmsData.point4 }}</p></div>
      </div>

    </div>

    <div class="mt-20 text-center bg-gradient-to-r from-accent-teal/10 via-primary/20 to-accent-cyan/10 dark:from-[#1F958D]/20 dark:via-[#0df2f2]/20 dark:to-[#17C6BA]/20 rounded-3xl p-10 border border-primary/20 dark:border-[#0df2f2]/30 shadow-[0_0_40px_rgba(13,242,242,0.1)]" data-aos="zoom-in" data-aos-delay="200">
      <p class="text-sm font-bold text-slate-500 dark:text-gray-400 uppercase tracking-[0.3em] mb-4">{{ cmsData.mottoTitle }}</p>
      <h2 class="text-3xl md:text-5xl font-black text-slate-900 dark:text-white uppercase tracking-widest">
        {{ cmsData.mottoWord1 }} <span class="text-primary dark:text-[#0df2f2]">{{ cmsData.mottoWord2 }}</span> {{ cmsData.mottoWord3 }}
      </h2>
    </div>

  </div>
</div>
