<div class="w-full">
  <div *ngFor="let section of filteredSections" class="mb-16">
    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-8 border-b-2 border-accent-cyan pb-3 inline-block" data-aos="fade-right">
      {{ section.title }}
    </h2>

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2 xl:grid-cols-3">
      <div *ngFor="let member of section.members; let i = index"
           data-aos="fade-up" [attr.data-aos-delay]="(i % 3) * 100"
           class="group flex flex-col rounded-[2rem] border border-slate-200 bg-white p-6 shadow-sm transition-all duration-300 hover:border-accent-cyan/40 hover:shadow-xl dark:border-white/10 dark:bg-white/5 dark:hover:bg-white/10 dark:hover:border-accent-cyan/80 dark:hover:shadow-[0_0_30px_rgba(6,182,212,0.15)]">

        <div class="flex items-center gap-5 mb-5 border-b border-slate-100 dark:border-white/10 pb-5">
          <div class="shrink-0 h-20 w-20 overflow-hidden rounded-full border-2 border-accent-cyan/30 bg-slate-50 flex items-center justify-center transition-transform duration-500 group-hover:scale-105 group-hover:border-accent-cyan dark:border-accent-cyan/60 dark:bg-[#121212]">
            <span class="material-symbols-outlined text-4xl text-slate-300 dark:text-slate-500">school</span>
          </div>

          <div class="flex-1">
            <h3 class="text-[1.1rem] font-bold text-slate-900 leading-snug transition-colors group-hover:text-accent-cyan dark:text-white dark:group-hover:text-primary">
              {{ member.name }}
            </h3>
            <p class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 mt-1">
              {{ section.title }}
            </p>
          </div>
        </div>

        <div class="flex-grow">
          <p class="text-xs font-bold text-slate-500 dark:text-slate-400 mb-3 uppercase tracking-widest">Areas of Expertise</p>
          <div class="flex flex-wrap gap-2">
                        <span *ngFor="let exp of member.expertise" class="inline-block px-3 py-1 rounded-md bg-accent-cyan/10 border border-accent-cyan/20 text-xs font-medium text-slate-700 dark:bg-accent-cyan/20 dark:border-accent-cyan/30 dark:text-gray-200 transition-colors hover:bg-accent-cyan hover:text-white dark:hover:bg-accent-cyan dark:hover:text-white">
                            {{ exp }}
                        </span>
          </div>
        </div>

        <div class="mt-6 pt-4 border-t border-slate-100 dark:border-white/10 flex flex-col gap-2">
          <a [href]="'mailto:' + member.email" class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400 hover:text-accent-cyan dark:hover:text-primary transition-colors no-underline">
            <span class="material-symbols-outlined text-[18px]">mail</span>
            {{ member.email }}
          </a>
          <div class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400">
            <span class="material-symbols-outlined text-[18px]">desk</span>
            {{ member.office }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="filteredSections.length === 0" class="text-center py-12">
    <div class="w-16 h-16 bg-slate-100 dark:bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4">
      <span class="material-symbols-outlined text-slate-400 text-3xl">person_search</span>
    </div>
    <h3 class="text-lg font-bold text-slate-700 dark:text-white mb-1">No Experts Found</h3>
    <p class="text-slate-500 dark:text-gray-400">Try searching for a different name or research area.</p>
  </div>
</div>
