<div class="w-full">
  <div *ngFor="let section of filteredSections" class="mb-16">
    <h2 class="text-2xl font-bold text-slate-800 dark:text-white mb-8 border-b-2 border-primary pb-3 inline-block" data-aos="fade-right">{{ section.title }}</h2>
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">

      <div *ngFor="let member of section.members; let i = index" (click)="onMemberClick(member)" data-aos="fade-up" [attr.data-aos-delay]="(i % 4) * 100" class="group relative flex flex-col items-center rounded-[2rem] border border-slate-200 bg-white p-8 shadow-sm transition-all duration-300 hover:border-primary/30 hover:shadow-xl dark:border-white/10 dark:bg-white/5 dark:hover:bg-white/10 dark:hover:border-primary/50 dark:hover:shadow-[0_0_30px_rgba(13,242,242,0.15)] cursor-pointer">

        <div class="relative mb-4">
          <div class="relative z-10 h-28 w-28 overflow-hidden rounded-full border-[3px] border-primary/30 bg-slate-100 shadow-[0_0_10px_rgba(8,145,178,0.12)] flex items-center justify-center transition-transform duration-500 group-hover:scale-105 group-hover:border-primary dark:border-primary/50 dark:bg-[#121212] dark:shadow-[0_0_15px_rgba(13,242,242,0.3)]">
            <img *ngIf="member.avatar" [src]="fixUrl(member.avatar)" [alt]="member.name" class="h-full w-full object-cover">
            <span *ngIf="!member.avatar" class="material-symbols-outlined text-5xl text-slate-400">person</span>
          </div>
        </div>

        <div class="z-10 space-y-1 text-center w-full">
          <h3 class="text-xl font-bold text-slate-900 transition-colors group-hover:text-primary dark:text-white dark:group-hover:text-primary truncate" [title]="member.name">{{ member.name }}</h3>
          <p class="text-xs font-bold uppercase tracking-wide text-primary opacity-90 dark:text-accent-cyan">{{ member.role }}</p>

          <div *ngIf="member.focusAreas && member.focusAreas.length > 0" class="flex flex-wrap justify-center gap-1 mt-3">
            <span *ngFor="let tag of member.focusAreas.slice(0, 3)" class="px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider bg-primary/10 text-primary border border-primary/20 rounded-full truncate max-w-[100px]">{{ tag }}</span>
            <span *ngIf="member.focusAreas.length > 3" class="px-2 py-0.5 text-[9px] font-bold uppercase tracking-wider bg-slate-100 text-slate-400 dark:bg-white/10 dark:text-gray-400 rounded-full border border-slate-200 dark:border-white/10">+{{ member.focusAreas.length - 3 }}</span>
          </div>

          <p *ngIf="member.bio" class="text-xs text-slate-500 dark:text-gray-400 mt-3 line-clamp-2 font-body leading-relaxed">{{ member.bio }}</p>
        </div>

        <div class="mt-5 flex gap-3 opacity-0 transition-all duration-300 group-hover:opacity-100 max-md:opacity-100">
          <a *ngIf="member.email" [href]="'mailto:' + member.email" (click)="$event.stopPropagation()" class="text-slate-400 transition-colors hover:text-primary dark:text-slate-500 dark:hover:text-primary cursor-pointer border-none bg-transparent no-underline" title="Email"><span class="material-symbols-outlined text-lg">alternate_email</span></a>
          <a *ngIf="member.socialLink" [href]="member.socialLink" target="_blank" (click)="$event.stopPropagation()" class="text-slate-400 transition-colors hover:text-primary dark:text-slate-500 dark:hover:text-primary cursor-pointer border-none bg-transparent no-underline" title="Profile"><span class="material-symbols-outlined text-lg">link</span></a>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="filteredSections.length === 0" class="text-center py-12">
    <div class="w-16 h-16 bg-slate-100 dark:bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-slate-400 text-3xl">search_off</span></div>
    <h3 class="text-lg font-bold text-slate-700 dark:text-white mb-1">No Members Found</h3>
    <p class="text-slate-500 dark:text-gray-400">We couldn't find anyone matching "{{ searchTerm }}" in Our Team.</p>
  </div>
</div>
