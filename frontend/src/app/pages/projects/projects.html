<div class="relative min-h-screen bg-slate-50 dark:bg-[#050505] text-slate-900 dark:text-white pt-24 pb-20">
  <div class="max-w-[1200px] mx-auto px-6">

    <div class="text-center mb-16" data-aos="fade-down">
      <h1 class="text-4xl md:text-5xl font-black mb-4 uppercase tracking-tight">Research <span class="text-primary dark:text-[#0df2f2]">Projects</span></h1>
      <p class="text-slate-500 dark:text-gray-400 text-lg max-w-2xl mx-auto">Discover the innovative ongoing research projects spearheaded by our lab members.</p>
    </div>

    <div class="flex flex-col gap-6" data-aos="fade-up">
      <div *ngFor="let proj of projectList" class="bg-white dark:bg-[#121212] rounded-2xl p-8 border border-slate-200 dark:border-white/10 shadow-sm hover:border-primary/50 dark:hover:border-[#0df2f2]/50 transition-all group relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 h-full bg-primary dark:bg-[#0df2f2]"></div>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-4">
          <h2 class="text-2xl font-bold group-hover:text-primary dark:group-hover:text-[#0df2f2] transition-colors">{{ proj.title }}</h2>
          <div class="flex items-center gap-4 text-sm font-medium text-slate-500 dark:text-gray-400 bg-slate-50 dark:bg-white/5 px-4 py-2 rounded-lg">
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">person</span> {{ proj.name }}</span>
            <span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-gray-600"></span>
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[18px]">calendar_today</span> {{ proj.date }}</span>
          </div>
        </div>

        <div class="bg-slate-50 dark:bg-black/40 rounded-xl p-5 border border-slate-100 dark:border-white/5">
          <p class="text-xs font-bold text-slate-400 dark:text-gray-500 uppercase tracking-widest mb-2">Project Summary</p>
          <p class="text-slate-700 dark:text-gray-300 leading-relaxed">{{ proj.summary }}</p>
        </div>
      </div>
    </div>

  </div>
</div>
