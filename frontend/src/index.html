<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UUM Internetwork </title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-background-dark text-slate-900 dark:text-white font-display overflow-x-hidden selection:bg-accent-cyan selection:text-white dark:selection:text-black">

<app-root></app-root>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  // 当网页加载完毕后，启动动画，duration 是动画时长(毫秒)
  document.addEventListener("DOMContentLoaded", function() {
    AOS.init({ duration: 800, once: true, offset: 100 });
  });
</script>
</body>
</html>
